<svg width="1200" height="76" viewBox="0 0 1200 76" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="olive-crt.nvim base palette swatch">
  <defs>
    <linearGradient id="sheen" x1="0" y1="0" x2="1200" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFCF6" stop-opacity="0.12"/>
      <stop offset="0.5" stop-color="#FBFCF6" stop-opacity="0"/>
      <stop offset="1" stop-color="#171A15" stop-opacity="0.08"/>
    </linearGradient>
    <pattern id="scanlines" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="2" fill="#FBFCF6" fill-opacity="0.045"/>
